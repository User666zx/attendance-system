    <style>
        body { font-family: 'Noto Sans Thai', sans-serif; user-select: none; }

        /* Toast Notification Styles */
        #toast-container {

            z-index: 9999;

        .toast.success { background: #2b2d31; border-left: 4px solid #57f287; color: white; }

<body class="bg-[#313338] text-gray-200 h-screen flex overflow-hidden">

        <!-- Content Area (สามารถเลื่อนได้) -->
        <div class="flex-1 overflow-y-auto custom-scroll p-5 space-y-4 pb-20">
            
            <!-- ช่องกรอกชื่อ+ตำแหน่ง -->
            <div>
                <label class="text-sm text-gray-400 block mb-2">ชื่อทีมงาน + ตำแหน่ง <span class="text-red-400">*</span></label>
                <input type="text" id="user-info" class="w-full bg-[#1e1f22] text-white px-4 py-3 rounded-lg outline-none text-base border border-transparent focus:border-[#5865f2] transition" placeholder="เรย์ด้า CL">
                <div class="text-xs text-gray-500 mt-2 flex items-center gap-1">

            </div>

            <!-- ปุ่มกด -->
            <div class="space-y-3">
                <button onclick="submitLog('checkin')" id="btn-checkin" class="w-full bg-[#57f287] hover:bg-[#3ba55c] text-black font-semibold py-3 rounded-lg transition flex items-center justify-center gap-2 text-base">
                    <i class="fas fa-right-to-bracket"></i> เข้างาน

                <!-- ปุ่มออกงาน -->
                <button onclick="toggleCheckoutForm()" id="btn-checkout-toggle" class="w-full bg-[#ed4245] hover:bg-[#c03538] text-white font-semibold py-3 rounded-lg transition flex items-center justify-center gap-2 text-base">

                </button>
                
                <!-- ฟอร์มออกงาน -->
                <div id="checkout-form" class="hidden">
                    <div class="bg-[#1e1f22] p-4 rounded-lg border border-gray-700 space-y-3">
                        <div>
                            <label class="text-xs text-gray-400 block mb-1">เหตุผลที่ออกงาน</label>
                            <textarea id="checkout-reason" rows="2" class="w-full bg-[#383a40] text-white px-3 py-2 rounded outline-none text-sm resize-none" placeholder="เช่น ทำงานครบแล้ว, ลาป่วย..."></textarea>
                        </div>
                        <button onclick="submitLog('checkout')" id="btn-checkout-confirm" class="w-full bg-[#ed4245] hover:bg-[#c03538] text-white text-sm font-semibold py-2 rounded-md transition">
                            <i class="fas fa-check mr-1"></i> ยืนยันออกงาน
                        </button>
                    </div>
                </div>

                <!-- ปุ่มลางาน -->
                <button onclick="toggleLeaveForm()" id="btn-leave-toggle" class="w-full bg-[#f97316] hover:bg-[#ea580c] text-black font-semibold py-3 rounded-lg transition flex items-center justify-center gap-2 text-base">
                    <i class="fas fa-plane-departure"></i> ลางาน (พร้อมเหตุผล)

                <div id="leave-form" class="hidden">

                </button>

                    <i class="fas fa-camera"></i> ส่งหลักฐานการทำงาน
                </button>
            </div>

            <!-- หน้าต่างแสดงเวลานับถอยหลัง -->
            <div id="timer-box">
                <div class="text-xs text-gray-400 uppercase tracking-wider mb-1">เวลาคงเหลือ (ครบ 3 ชม)</div>
                <div id="countdown-display" class="timer-display">00:00:00</div>

            <!-- ฟอร์มส่งหลักฐาน -->
            <div id="proof-form" class="hidden">
                <div class="bg-[#1e1f22] p-4 rounded-lg border border-gray-700 space-y-3">
                    <div>
                        <label class="text-xs text-gray-400 block mb-1">รายละเอียดงาน</label>
                        <textarea id="proof-detail" rows="2" class="w-full bg-[#383a40] text-white px-3 py-2 rounded outline-none text-sm resize-none" placeholder="ทำอะไรมาบ้าง..."></textarea>
                    </div>
                    
                    <input type="file" id="proof-file-input" accept="image/*" class="hidden">

                    <div>
                        <label class="text-xs text-gray-400 block mb-1">แนบรูปภาพ (ขนาดไม่เกิน 500KB)</label>
                        <button type="button" onclick="document.getElementById('proof-file-input').click()" class="w-full bg-[#383a40] hover:bg-[#4a4d55] text-white px-3 py-2 rounded outline-none text-sm flex items-center justify-center gap-2 border border-dashed border-gray-600 transition">
                            <i class="fas fa-image"></i> เลือกรูปภาพจากเครื่อง
                        </button>
                        <div id="file-name-display" class="text-[10px] text-green-400 mt-1 hidden">
                            <i class="fas fa-check"></i> เลือกรูปเรียบร้อย
                        </div>
                    </div>

                    <button onclick="submitLog('proof')" class="w-full bg-[#5865f2] hover:bg-[#4752c4] text-white text-sm font-semibold py-2 rounded-md transition">
                        <i class="fas fa-paper-plane mr-1"></i> ยืนยันส่ง

            </div>

        </div>
        
        <!-- Status Footer (อัปเดตเป็น กำลังปรับปรุง สีเหลือง) -->
        <div class="p-5 border-t border-gray-700 shrink-0 bg-[#2b2d31] z-10">
            <div class="text-xs text-gray-500 flex items-center gap-2">
                <i class="fas fa-circle text-yellow-400 text-[8px]"></i> กำลังปรับปรุง
            </div>
        </div>
    </div>


    <!-- ========================================== -->
    <!-- ส่วนที่ 2: แถบด้านขวา -->
    <!-- ========================================== -->
    <div class="flex-1 flex flex-col bg-[#313338]">
        
        <!-- Header -->
        <div class="h-16 bg-[#2b2d31] border-b border-gray-700 flex items-center px-6 shrink-0">
            <i class="fas fa-stream text-gray-400 mr-3"></i>
            <span class="font-semibold text-white text-lg">ข้อมูลที่ทีมงานแจ้งเข้ามา</span>
        </div>

        <!-- Live Feed Container -->
        <div class="flex-1 overflow-y-auto p-6 space-y-4 custom-scroll" id="live-feed">
            
            <div id="empty-state" class="flex flex-col items-center justify-center h-full text-gray-500">
                <i class="fas fa-inbox text-5xl mb-4"></i>
                <p class="text-lg">ยังไม่มีข้อมูลการเข้างาน</p>
                <p class="text-sm mt-1">*คลิกขวาหรือกดค้างที่รายการเพื่อลบ*</p>
            </div>

        </div>
    </div>


    <script>
        const liveFeed = document.getElementById('live-feed');
        const emptyState = document.getElementById('empty-state');
        let selectedImageBase64 = null;
        let countdownInterval = null;

        function showToast(message, type = 'info') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            let icon = 'info-circle';
            if (type === 'success') icon = 'check-circle';
            if (type === 'error') icon = 'exclamation-circle';
            toast.innerHTML = `<i class="fas fa-${icon}"></i> <span>${message}</span>`;
            container.appendChild(toast);
            setTimeout(() => {
                toast.style.animation = 'fadeOut 0.3s ease-out forwards';
                toast.addEventListener('animationend', () => toast.remove());
            }, 3000);
        }

        function toggleProofForm() {
            const form = document.getElementById('proof-form');
            form.classList.toggle('hidden');
        }

        function toggleCheckoutForm() {
            const form = document.getElementById('checkout-form');
            form.classList.toggle('hidden');
        }

        // --- ฟังก์ชันสลับฟอร์มลางาน ---
        function toggleLeaveForm() {
            const form = document.getElementById('leave-form');
            form.classList.toggle('hidden');
        }

        // --- จัดการไฟล์รูป ---
        const fileInput = document.getElementById('proof-file-input');
        fileInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            if (file.size > 500 * 1024) { 
                showToast("❌ รูปมีขนาดใหญ่เกินไป (ต้องน้อยกว่า 500KB)", "error");
                fileInput.value = ""; 
                selectedImageBase64 = null;
                document.getElementById('file-name-display').classList.add('hidden');
                return;
            }
            const reader = new FileReader();
            reader.onload = function(evt) {
                selectedImageBase64 = evt.target.result;
                document.getElementById('file-name-display').classList.remove('hidden');
                showToast("✅ เลือกรูปภาพเรียบร้อย", "success");
            };
            reader.readAsDataURL(file);
        });

        function parseUserInfo(input) {
            const parts = input.trim().split(/\s+/); 
            if (parts.length < 2) return null;
            const role = parts[parts.length - 1].toUpperCase(); 
            const validRoles = ['AM', 'CL', 'EN', 'PR', 'HCL', 'PL', 'HAM']; 
            if (!validRoles.includes(role)) return null; 
            const name = parts.slice(0, -1).join(' '); 
            return { name: name, role: role };
        }

        function setLoading(isLoading, btnId) {
            const btn = document.getElementById(btnId);
            if (!btn) return;
            if (isLoading) {
                const originalText = btn.innerHTML;
                btn.dataset.original = originalText;
                btn.innerHTML = `<i class="fas fa-spinner fa-spin"></i> กำลังบันทึก...`;
                btn.disabled = true;
                btn.classList.add('opacity-75', 'cursor-not-allowed');
            } else {
                btn.innerHTML = btn.dataset.original;
                btn.disabled = false;
                btn.classList.remove('opacity-75', 'cursor-not-allowed');
            }
        }

        function submitLog(actionType) {
            if (!db) {
                showToast("❌ ระบบยังไม่เชื่อมต่อฐานข้อมูล", "error");
                return;
            }

            const inputRaw = document.getElementById('user-info').value.trim();
            const parsed = parseUserInfo(inputRaw);

            if (!parsed) {
                showToast('⚠️ กรุณากรอกชื่อ+ตำแหน่งให้ถูกต้อง', "error");
                document.getElementById('user-info').classList.add('border-red-500');
                setTimeout(() => document.getElementById('user-info').classList.remove('border-red-500'), 2000);
                return;
            }

            let detail = "";
            let imgUrl = "";
            let btnId = "";

            if (actionType === 'checkin') btnId = "btn-checkin";
            else if (actionType === 'checkout') {
                btnId = "btn-checkout-confirm";
                detail = document.getElementById('checkout-reason').value.trim();
                if (!detail) {
                    showToast("⚠️ กรุณาระบุเหตุผลที่ออกงาน", "error");
                    return;
                }
            } 
            else if (actionType === 'leave') {
                // --- จัดการ Logic ลางาน ---
                btnId = "btn-leave-confirm";
                detail = document.getElementById('leave-reason').value.trim();
                if (!detail) {
                    showToast("⚠️ กรุณาระบุเหตุผลที่ลางาน", "error");
                    return;
                }
            } 
            else if (actionType === 'proof') {
                btnId = "btn-proof-toggle";
                detail = document.getElementById('proof-detail').value.trim();
                imgUrl = selectedImageBase64; 
                if (!detail || !imgUrl) {
                    showToast("⚠️ กรุณากรอกรายละเอียดและแนบรูปภาพ", "error");
                    return;
                }
            }

            setLoading(true, btnId);

            const logsRef = db.ref('logs');
            
            try {
                logsRef.push({
                    user: parsed.name,
                    role: parsed.role,
                    action: actionType,
                    detail: detail,
                    imageUrl: imgUrl,
                    timestamp: firebase.database.ServerValue.TIMESTAMP 
                }, (error) => {
                    setLoading(false, btnId);

                    if (error) {
                        showToast("❌ บันทึกข้อมูลไม่สำเร็จ: " + error.message, "error");
                    } else {
                        let msg = "";
                        if(actionType === 'checkin') msg = "✅ บันทึกเข้างานเรียบร้อย";
                        if(actionType === 'checkout') msg = "👋 บันทึกออกงานเรียบร้อย";
                        if(actionType === 'leave') msg = "🌴 แจ้งลางานเรียบร้อย";
                        if(actionType === 'proof') msg = "📸 ส่งหลักฐานเรียบร้อย";
                        
                        showToast(msg, "success");

                        if (actionType === 'checkout') {
                            document.getElementById('checkout-reason').value = '';
                            toggleCheckoutForm();
                        }
                        if (actionType === 'leave') {
                            document.getElementById('leave-reason').value = '';
                            toggleLeaveForm();
                        }
                        if (actionType === 'proof') {
                            document.getElementById('proof-detail').value = '';
                            fileInput.value = '';
                            selectedImageBase64 = null;
                            document.getElementById('file-name-display').classList.add('hidden');
                            toggleProofForm();
                        }
                    }
                });
            } catch (e) {
                setLoading(false, btnId);
                showToast("❌ เกิดข้อผิดพลาด: " + e.message, "error");
                console.error(e);
            }
        }

        // --- Check Time Function ---
        function checkTime() {
            if (!db) {
                showToast("❌ ระบบยังไม่เชื่อมต่อฐานข้อมูล", "error");
                return;
            }

            const inputRaw = document.getElementById('user-info').value.trim();
            const parsed = parseUserInfo(inputRaw);

            if (!parsed) {
                showToast('⚠️ กรุณากรอกชื่อ+ตำแหน่งให้ถูกต้อง', "error");
                return;
            }

            if (countdownInterval) clearInterval(countdownInterval);

            const timerBox = document.getElementById('timer-box');
            const display = document.getElementById('countdown-display');
            const message = document.getElementById('timer-message');
            
            timerBox.style.display = 'block';
            display.textContent = "กำลังโหลด...";
            message.textContent = "กำลังค้นหาบันทึก...";
            display.classList.remove('timer-ready');

            db.ref('logs').orderByChild('user').equalTo(parsed.name).limitToLast(5).once('value', (snapshot) => {
                if (!snapshot.exists()) {
                    display.textContent = "--:--:--";
                    message.textContent = "ไม่พบบันทึกการเข้างานของคนนี้";
                    return;
                }

                let latestEntry = null;
                let latestTimestamp = 0;

                snapshot.forEach((child) => {
                    const data = child.val();
                    if (data.timestamp > latestTimestamp) {
                        latestTimestamp = data.timestamp;
                        latestEntry = data;
                    }
                });

                if (!latestEntry) {
                    message.textContent = "ไม่พบบันทึก";
                    return;
                }

                if (latestEntry.action !== 'checkin') {
                    display.textContent = "--:--:--";
                    message.textContent = "บันทึกล่าสุดของคุณคือ 'ออกงาน' หรือ 'ลางาน' (ไม่ได้เข้างานอยู่)";
                    return;
                }

                const checkInTime = latestEntry.timestamp;
                const targetTime = checkInTime + (3 * 60 * 60 * 1000); //3 hours in ms
                
                function updateTimer() {
                    const now = Date.now();
                    const diff = targetTime - now;

                    if (diff <= 0) {
                        clearInterval(countdownInterval);
                        display.textContent = "00:00:00";
                        display.classList.add('timer-ready');
                        message.textContent = "✅ ทำงานครบ 3 ชั่วโมงแล้ว สามารถออกจากดิสคอร์ดได้";
                        showToast("คุณสามารถออกงานได้แล้วครับ!", "success");
                    } else {
                        const h = Math.floor(diff / (1000 * 60 * 60));
                        const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                        const s = Math.floor((diff % (1000 * 60)) / 1000);
                        
                        const hStr = h < 10 ? "0" + h : h;
                        const mStr = m < 10 ? "0" + m : m;
                        const sStr = s < 10 ? "0" + s : s;

                        display.textContent = `${hStr}:${mStr}:${sStr}`;
                        message.textContent = "อยู่ในเวลางาน (ครบ 3 ชม จึงออกได้)";
                    }
                }

                updateTimer();
                countdownInterval = setInterval(updateTimer, 1000);
            });
        }

        // --- Delete Function ---
        function deleteLog(key) {
            if(!db) return;
            if(confirm('ยืนยันลบบันทึกนี้?')) {
                db.ref('logs/' + key).remove()
                .then(() => showToast("🗑️ ลบบันทึกเรียบร้อย", "success"))
                .catch(err => showToast("❌ ลบไม่สำเร็จ", "error"));
            }
        }

        if (db) {
            const logsRef = db.ref('logs').orderByChild('timestamp').limitToLast(100);
            
            logsRef.on('child_added', (snapshot) => {
                if (emptyState) emptyState.style.display = 'none';
                addLogToUI(snapshot);
            });
            logsRef.on('child_removed', (snapshot) => {
                const el = document.getElementById('log-' + snapshot.key);
                if(el) el.remove();
            });
        }

        function addLogToUI(snapshot) {
            const data = snapshot.val();
            const key = snapshot.key;

            const time = new Date(data.timestamp);
            const timeStr = time.toLocaleString('th-TH', {
                hour: '2-digit', minute:'2-digit', 
                day:'2-digit', month:'short', year:'numeric'
            });
            
            let roleColor = 'bg-gray-500';
            if(data.role === 'AM') roleColor = 'bg-red-500';
            if(data.role === 'CL') roleColor = 'bg-blue-500';
            if(data.role === 'EN') roleColor = 'bg-green-500';
            if(data.role === 'PR') roleColor = 'bg-purple-500';
            if(data.role === 'HCL') roleColor = 'bg-orange-500';
            if(data.role === 'PL') roleColor = 'bg-teal-500';
            if(data.role === 'HAM') roleColor = 'bg-pink-500';

            let html = `
                <div id="log-${key}" class="log-entry group" oncontextmenu="deleteLog('${key}'); return false;">
                    <div class="flex gap-3">
                        <div class="w-10 h-10 bg-indigo-700 rounded-full flex items-center justify-center shrink-0 text-xs font-bold text-white">
                            ${data.user.substring(0,2)}
                        </div>
                        <div class="flex-1">
                            <div class="flex items-center gap-2 mb-1">
                                <span class="text-sm font-semibold text-white">${data.user}</span>
                                <span class="text-[10px] px-1.5 py-0.5 rounded ${roleColor} text-white font-bold">${data.role}</span>
                                <span class="text-xs text-gray-500">${timeStr}</span>
                            </div>
            `;

            if (data.action === 'checkin') {
                html += `<div class="discord-embed border-[#57f287]"><span class="text-sm text-[#57f287] font-semibold"><i class="fas fa-check-circle mr-1"></i> บันทึกเข้างานสำเร็จ</span></div>`;
            } 
            else if (data.action === 'checkout') {
                let reasonHtml = '';
                if(data.detail) {
                    reasonHtml = `<div class="text-xs text-gray-300 mt-1 border-t border-gray-600 pt-1">เหตุผล: ${data.detail}</div>`;
                }
                html += `<div class="discord-embed border-[#ed4245]"><span class="text-sm text-[#ed4245] font-semibold"><i class="fas fa-sign-out-alt mr-1"></i> บันทึกออกงานสำเร็จ</span>${reasonHtml}</div>`;
            } 
            else if (data.action === 'leave') {
                // --- แสดงผลลางาน ---
                let reasonHtml = '';
                if(data.detail) {
                    reasonHtml = `<div class="text-xs text-gray-300 mt-1 border-t border-gray-600 pt-1">เหตุผล: ${data.detail}</div>`;
                }
                html += `<div class="discord-embed border-[#f97316]"><span class="text-sm text-[#f97316] font-semibold"><i class="fas fa-plane-departure mr-1"></i> แจ้งลางาน</span>${reasonHtml}</div>`;
            }
            else if (data.action === 'proof') {
                html += `
                    <div class="discord-embed border-[#5865f2]">
                        <div class="text-sm text-[#5865f2] font-semibold mb-1"><i class="fas fa-image mr-1"></i> ส่งหลักฐานการทำงาน</div>
                        <div class="text-sm text-gray-300">${data.detail}</div>
                        ${data.imageUrl ? `<img src="${data.imageUrl}" class="mt-3 rounded-md max-h-48 object-cover cursor-pointer hover:opacity-80 transition" onclick="window.open('${data.imageUrl}', '_blank')">` : ''}
                    </div>
                `;
            }

            html += `</div></div></div>`;
            
            liveFeed.insertAdjacentHTML('beforeend', html);
            
            const logEl = document.getElementById(`log-${key}`);
            let pressTimer;
            
            logEl.addEventListener('touchstart', (e) => {
                pressTimer = setTimeout(() => { deleteLog(key); }, 800);
            });
            logEl.addEventListener('touchend', () => clearTimeout(pressTimer));
            logEl.addEventListener('touchmove', () => clearTimeout(pressTimer));

            liveFeed.scrollTop = liveFeed.scrollHeight;
        }
    </script>
</body>
</html>
